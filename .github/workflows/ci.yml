name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run default test suite
        run: npm run test

      - name: Enforce lint warning budget
        run: npm run lint -- --max-warnings 0

      - name: Build application
        run: npm run build

      - name: Check changed lines for whitespace errors
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
          else
            git show --check --oneline --no-renames "$HEAD_SHA"
          fi

  postgres-concurrency:
    name: PostgreSQL concurrency tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: p5_sy5g_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: p5_sy5g_test
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PostgreSQL concurrency suite
        run: npm run test:concurrency

      - name: Replay migrations and verify RPC/RLS behavior
        run: npm run test:database-contract
